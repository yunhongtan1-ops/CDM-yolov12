# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
# iSSOD.yaml


# 路径建议使用绝对路径，尤其你现在是放在 autodl-tmp 目录下训练
path: /root/autodl-tmp/datasets/iSOOD_10481_v1.0_Small_Split  # ✅ 改为实际绝对路径
train: images/train
val: images/val
test:  # 如果有 test 数据集可补上

names:
  0: combined_sewer
  1: stormwater
  2: industrial_wastewater
  3: agricultural_drainage
  4: livestock
  5: aquaculture
  6: surface_runoff
  7: wastewater_treatment
  8: domestic_sewage
  9: others